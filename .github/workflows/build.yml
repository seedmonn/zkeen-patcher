name: Build and Release

on:
  schedule:
    - cron: '3 3 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build .dat files
        run: |
          mkdir -p output
          go run . -out ./output

      - name: Rename for release
        run: |
          cp output/merged.dat output/geosite.dat
          cp output/zkeenip-patched.dat output/geoip.dat

      - name: Delete previous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(date +%Y%m%d)
          gh release delete "$TAG" --yes || true
          git tag -d "$TAG" || true
          git push origin ":refs/tags/$TAG" || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(date +%Y%m%d)
          gh release create "$TAG" \
            output/geosite.dat \
            output/geoip.dat \
            --title "$TAG" \
            --latest \
            --generate-notes
